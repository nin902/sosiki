<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ランダムテスト</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; background: #f0f0f0; }
        img { max-width: 100%; max-height: 55vh; border: 2px solid #333; margin: 10px 0; background: white; }
        #fileNameDisplay { font-size: 16px; color: #333; margin-bottom: 5px; height: 1.2em; font-weight: bold; }
        button { padding: 15px 30px; font-size: 18px; width: 90%; max-width: 300px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; background-color: #007aff; color: white; }
        .btn-danger { background-color: #ff3b30; }
        #reviewList { text-align: left; background: white; padding: 15px; margin-top: 20px; border-radius: 8px; max-width: 800px; margin-left: auto; margin-right: auto; }
        .review-item { font-size: 14px; border-bottom: 1px solid #ddd; padding: 8px 0; }
    </style>
</head>
<body>
    <input type="file" id="fileInput" multiple accept="image/*">
    <div id="viewer" style="display:none;">
        <p id="counter" style="margin: 5px 0; font-weight: bold;"></p>
        <div id="fileNameDisplay"></div>
        <img id="img">
        <div id="controls">
            <button id="btnShow" onclick="showAns()">答えを表示</button>
            <div id="judge" style="display:none;">
                <button onclick="judge(true)">OK (次へ)</button>
                <button onclick="judge(false)" class="btn-danger">NG (記録して次へ)</button>
            </div>
        </div>
    </div>
    <div id="reviewList">
        <h3>NG回数リスト:</h3>
        <div id="list"></div>
    </div>
    <script>
        let problems = [], ansMap = new Map(), idx = 0, counts = {};

        document.getElementById('fileInput').onchange = (e) => {
            const all = Array.from(e.target.files).filter(f => f.name.toLowerCase().endsWith('.png'));
            
            ansMap = new Map();
            all.forEach(f => { if (f.name.includes('_ans')) ansMap.set(f.name, f); });
            problems = all.filter(f => !f.name.includes('_ans')).sort(() => Math.random() - 0.5);
            
            if (problems.length === 0) {
                alert('PNG形式の問題画像が見つからない。');
                return;
            }
            
            document.getElementById('viewer').style.display = 'block';
            idx = 0;
            showProb();
        };

        function showProb() {
            document.getElementById('counter').innerText = `第 ${idx + 1} 問 / ${problems.length} 問中`;
            // ファイル名を隠す
            document.getElementById('fileNameDisplay').innerText = "(問題)";
            document.getElementById('img').src = URL.createObjectURL(problems[idx]);
            document.getElementById('btnShow').style.display = 'inline-block';
            document.getElementById('judge').style.display = 'none';
        }

        function showAns() {
            const ansName = problems[idx].name.replace('.png', '_ans.png');
            const ansFile = ansMap.get(ansName);
            if(ansFile) {
                document.getElementById('img').src = URL.createObjectURL(ansFile);
                // 答えのタイミングでファイル名を表示
                document.getElementById('fileNameDisplay').innerText = problems[idx].name + " / " + ansName;
            } else {
                document.getElementById('fileNameDisplay').innerText = problems[idx].name + " (※答え画像なし)";
            }
            document.getElementById('btnShow').style.display = 'none';
            document.getElementById('judge').style.display = 'block';
        }

        function judge(isOK) {
            if (!isOK) {
                const name = problems[idx].name;
                counts[name] = (counts[name] || 0) + 1;
                updateList();
            }
            idx = (idx + 1) % problems.length;
            showProb();
        }

        function updateList() {
            const list = document.getElementById('list');
            list.innerHTML = Object.entries(counts)
                .sort((a, b) => b[1] - a[1])
                .map(([n, c]) => `<div class="review-item">${n}: ${c}回</div>`)
                .join('');
        }
    </script>
</body>
</html>
