<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ランダムテスト</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f0f0; }
        #imgDisplay { max-width: 100%; max-height: 55vh; border: 2px solid #ccc; background-color: #fff; margin: 10px 0; }
        #fileNameDisplay { font-weight: bold; color: #333; margin-bottom: 5px; }
        .controls { margin-top: 10px; }
        button { padding: 15px 30px; font-size: 18px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; background-color: #007aff; color: white; }
        .btn-danger { background-color: #ff3b30; }
        .btn-secondary { background-color: #6c757d; }
        #saveLoadSection { background: #fff; padding: 15px; margin: 10px auto; border-radius: 8px; border: 1px solid #ccc; text-align: left; max-width: 800px; }
        #reviewList { text-align: left; margin-top: 30px; padding-top: 20px; border-top: 2px solid #ccc; max-width: 1000px; margin-left: auto; margin-right: auto; }
        .review-item { display: inline-block; margin: 10px; text-align: center; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; vertical-align: top; width: 160px; }
        .review-item img { max-height: 120px; max-width: 140px; display: block; margin: 0 auto 5px; object-fit: contain; }
        .badge { background: #ff3b30; color: white; padding: 2px 6px; border-radius: 10px; font-size: 14px; font-weight: bold; }
        textarea { width: 100%; height: 60px; margin-top: 5px; font-family: monospace; }
    </style>
</head>
<body>
    <h2>PC用：全画像一括選択</h2>
    <input type="file" id="fileInput" multiple accept="image/png">
    
    <div id="saveLoadSection">
        <h3>データ引き継ぎ（別端末用）</h3>
        <button class="btn-secondary" onclick="generateCode()">現在の記録からコードを発行↓</button>
        <button class="btn-secondary" onclick="loadCode()">↓入力されたコードから復元</button>
        <button class="btn-danger" style="float:right;" onclick="clearRecord()">全記録リセット</button>
        <textarea id="transferCode"></textarea>
    </div>

    <div id="viewer" style="display:none;">
        <p id="counter" style="font-weight: bold;"></p>
        <div id="fileNameDisplay"></div>
        <img id="imgDisplay">
        <div class="controls">
            <button id="btnShowAns">答えを表示</button>
            <div id="ansControls" style="display:none;">
                <button onclick="record(true)">わかった(次へ)</button>
                <button onclick="record(false)" class="btn-danger">わからなかった(記録)</button>
            </div>
        </div>
    </div>

    <div id="reviewList">
        <h3>わからなかったリスト:</h3>
        <div id="reviewContainer"></div>
    </div>

    <script>
        let problems = [], ansMap = new Map(), currentIdx = 0, mistakeCounts = JSON.parse(localStorage.getItem('pathoMistakes')) || {};

        document.getElementById('fileInput').onchange = (e) => {
            const all = Array.from(e.target.files);
            ansMap = new Map();
            all.forEach(f => { if (f.name.includes('_ans')) ansMap.set(f.name, f); });
            problems = all.filter(f => !f.name.includes('_ans')).sort(() => Math.random() - 0.5);
            document.getElementById('viewer').style.display = 'block';
            renderReviewList();
            showProb();
        };

        function showProb() {
            document.getElementById('fileNameDisplay').innerText = problems[currentIdx].name;
            document.getElementById('imgDisplay').src = URL.createObjectURL(problems[currentIdx]);
            document.getElementById('counter').innerText = `第 ${currentIdx + 1} 問 / ${problems.length} 問中`;
            document.getElementById('btnShowAns').style.display = 'inline-block';
            document.getElementById('ansControls').style.display = 'none';
        }

        document.getElementById('btnShowAns').onclick = () => {
            const ansName = problems[currentIdx].name.replace('.png', '_ans.png');
            const ansFile = ansMap.get(ansName);
            if(ansFile) {
                document.getElementById('imgDisplay').src = URL.createObjectURL(ansFile);
                document.getElementById('fileNameDisplay').innerText = ansName + " (答え)";
            }
            document.getElementById('btnShowAns').style.display = 'none';
            document.getElementById('ansControls').style.display = 'block';
        };

        function record(isKnown) {
            if (!isKnown) {
                const baseName = problems[currentIdx].name;
                mistakeCounts[baseName] = (mistakeCounts[baseName] || 0) + 1;
                localStorage.setItem('pathoMistakes', JSON.stringify(mistakeCounts));
                renderReviewList();
            }
            currentIdx = (currentIdx + 1) % problems.length;
            showProb();
        }

        function renderReviewList() {
            const container = document.getElementById('reviewContainer');
            container.innerHTML = '';
            Object.entries(mistakeCounts).sort((a,b) => b[1]-a[1]).forEach(([name, count]) => {
                const div = document.createElement('div'); div.className = 'review-item';
                div.innerHTML = `<img src="${URL.createObjectURL(problems.find(p=>p.name===name))}"><p>${name}</p><span class="badge">${count}回</span>`;
                container.appendChild(div);
            });
        }
        
        // 引き継ぎ用関数
        function generateCode() { document.getElementById('transferCode').value = btoa(encodeURIComponent(JSON.stringify(mistakeCounts))); }
        function loadCode() { mistakeCounts = JSON.parse(decodeURIComponent(atob(document.getElementById('transferCode').value))); localStorage.setItem('pathoMistakes', JSON.stringify(mistakeCounts)); renderReviewList(); }
        function clearRecord() { mistakeCounts = {}; localStorage.setItem('pathoMistakes', JSON.stringify(mistakeCounts)); renderReviewList(); }
    </script>
</body>
</html>
