<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ランダムテスト軽量版</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; background: #f0f0f0; }
        img { max-width: 100%; max-height: 50vh; border: 2px solid #333; margin: 10px 0; background: white; }
        button { padding: 15px 30px; font-size: 18px; width: 90%; max-width: 300px; margin: 5px; }
        #reviewList { text-align: left; background: white; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <input type="file" id="fileInput" multiple accept="image/png">
    <div id="viewer" style="display:none;">
        <img id="img">
        <div id="controls">
            <button id="btnShow" onclick="showAns()">答えを表示</button>
            <div id="judge" style="display:none;">
                <button onclick="judge(true)">OK (次へ)</button>
                <button onclick="judge(false)" style="background:#ff3b30; color:white;">NG (記録して次へ)</button>
            </div>
        </div>
    </div>
    <div id="reviewList">
        <h3>NG回数リスト:</h3>
        <div id="list"></div>
    </div>
    <script>
        let problems = [], ansMap = new Map(), idx = 0, counts = {};

        document.getElementById('fileInput').onchange = (e) => {
            const all = Array.from(e.target.files);
            // 答えファイル用マップ：ファイル名をキーとして保存
            ansMap = new Map();
            all.forEach(f => {
                if (f.name.includes('_ans')) {
                    ansMap.set(f.name, f);
                }
            });

            // 問題ファイル：_ansを含まないもの
            problems = all.filter(f => !f.name.includes('_ans')).sort(() => Math.random() - 0.5);
            
            document.getElementById('viewer').style.display = 'block';
            showProb();
        };

        function showProb() {
            document.getElementById('img').src = URL.createObjectURL(problems[idx]);
            document.getElementById('btnShow').style.display = 'inline-block';
            document.getElementById('judge').style.display = 'none';
        }

        function showAns() {
            // 現在の問題ファイル名の「.png」を「_ans.png」に置換して探す
            const ansName = problems[idx].name.replace('.png', '_ans.png');
            const ansFile = ansMap.get(ansName);
            if(ansFile) {
                document.getElementById('img').src = URL.createObjectURL(ansFile);
            }
            document.getElementById('btnShow').style.display = 'none';
            document.getElementById('judge').style.display = 'block';
        }

        function judge(isOK) {
            if (!isOK) {
                const name = problems[idx].name;
                counts[name] = (counts[name] || 0) + 1;
                document.getElementById('list').innerHTML += `<div>${name}: ${counts[name]}回</div>`;
            }
            idx = (idx + 1) % problems.length;
            showProb();
        }
    </script>
</body>
</html>
