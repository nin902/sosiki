<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>軽量テスト版</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; }
        img { max-width: 100%; max-height: 60vh; border: 2px solid #000; margin: 10px 0; }
        button { padding: 20px 40px; font-size: 20px; }
    </style>
</head>
<body>
    <input type="file" id="fileInput" multiple accept="image/*">
    <div id="viewer" style="display:none;">
        <img id="img">
        <br>
        <button onclick="next()">次の画像</button>
    </div>
    <script>
        let files = [], idx = 0;
        document.getElementById('fileInput').onchange = (e) => {
            files = Array.from(e.target.files).sort(() => Math.random() - 0.5);
            document.getElementById('viewer').style.display = 'block';
            show();
        };
        function show() {
            document.getElementById('img').src = URL.createObjectURL(files[idx]);
        }
        function next() {
            idx = (idx + 1) % files.length;
            show();
        }
    </script>
</body>
</html>
