<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ランダムテスト軽量版</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; background: #f0f0f0; }
        img { max-width: 100%; max-height: 50vh; border: 2px solid #333; margin: 10px 0; background: white; }
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        button { padding: 15px 25px; font-size: 16px; }
        #reviewList { text-align: left; background: white; padding: 10px; border-radius: 8px; }
        .item { display: inline-block; margin: 5px; font-size: 14px; background: #eee; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <input type="file" id="fileInput" multiple accept="image/*">
    <div id="viewer" style="display:none;">
        <img id="img">
        <div class="controls">
            <button onclick="record(true)">OK</button>
            <button onclick="record(false)" style="background:#ff3b30; color:white;">NG(記録)</button>
        </div>
    </div>
    <div id="reviewList">
        <h3>NG回数リスト:</h3>
        <div id="list"></div>
    </div>
    <script>
        let files = [], idx = 0, counts = {};
        document.getElementById('fileInput').onchange = (e) => {
            files = Array.from(e.target.files).sort(() => Math.random() - 0.5);
            document.getElementById('viewer').style.display = 'block';
            show();
        };
        function show() { document.getElementById('img').src = URL.createObjectURL(files[idx]); }
        function record(isOK) {
            if (!isOK) {
                const name = files[idx].name;
                counts[name] = (counts[name] || 0) + 1;
                updateList();
            }
            idx = (idx + 1) % files.length;
            show();
        }
        function updateList() {
            const list = document.getElementById('list');
            list.innerHTML = Object.entries(counts).map(([n, c]) => 
                `<div class="item">${n}: ${c}回</div>`).join('');
        }
    </script>
</body>
</html>
