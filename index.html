<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>病理ランダムテスト・復習版</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        img { max-width: 100%; max-height: 60vh; border: 2px solid #333; margin: 10px 0; }
        .controls { margin-top: 10px; }
        button { padding: 15px 30px; font-size: 18px; margin: 5px; cursor: pointer; }
        #reviewList { text-align: left; margin-top: 40px; }
    </style>
</head>
<body>
    <h2>1. 全画像（問題と答え）を選択してください</h2>
    <input type="file" id="fileInput" multiple accept="image/*">
    
    <div id="viewer" style="display:none;">
        <img id="imgDisplay">
        <div class="controls">
            <button id="btnShowAns">答えを表示</button>
            <div id="ansControls" style="display:none;">
                <button onclick="record(true)">わかった</button>
                <button onclick="record(false)" style="background:#ff3b30; color:white;">わからなかった</button>
            </div>
        </div>
    </div>

    <div id="reviewList">
        <h3>わからなかったリスト:</h3>
        <div id="reviewContainer"></div>
    </div>

    <script>
        let problems = [], currentIdx = 0;
        
        document.getElementById('fileInput').onchange = (e) => {
            const files = Array.from(e.target.files);
            // 「_ans」を含まないファイルを問題として抽出
            problems = files.filter(f => !f.name.includes('_ans')).sort(() => Math.random() - 0.5);
            document.getElementById('viewer').style.display = 'block';
            show(false);
        };

        function show(isAns) {
            const img = document.getElementById('imgDisplay');
            const file = problems[currentIdx];
            if (!isAns) {
                img.src = URL.createObjectURL(file);
                document.getElementById('btnShowAns').style.display = 'inline';
                document.getElementById('ansControls').style.display = 'none';
            } else {
                // 同じ名前の「_ans」付きファイルを探す
                const ansFile = Array.from(document.getElementById('fileInput').files)
                                     .find(f => f.name.includes(file.name.split('.')[0] + '_ans'));
                img.src = ansFile ? URL.createObjectURL(ansFile) : URL.createObjectURL(file);
                document.getElementById('btnShowAns').style.display = 'none';
                document.getElementById('ansControls').style.display = 'inline';
            }
        }

        document.getElementById('btnShowAns').onclick = () => show(true);

        function record(isKnown) {
            if (!isKnown) {
                const img = document.createElement('img');
                img.src = document.getElementById('imgDisplay').src;
                document.getElementById('reviewContainer').appendChild(img);
            }
            currentIdx = (currentIdx + 1) % problems.length;
            show(false);
        }
    </script>
</body>
</html>
