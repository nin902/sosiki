<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>病理テストツール</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f0f0f0; }
        #viewer { display: none; margin-top: 20px; }
        img { max-width: 100%; max-height: 50vh; object-fit: contain; border: 2px solid #ccc; background-color: #fff; }
        .controls { margin-top: 15px; }
        button { padding: 15px 25px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; background-color: #007aff; color: white; }
        #answer { font-size: 20px; font-weight: bold; margin-top: 15px; color: #d9534f; min-height: 25px; }
        .hidden { visibility: hidden; }
        #mistakeList { text-align: left; margin-top: 30px; padding: 10px; background: white; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>画像を選択して開始</h2>
    <input type="file" id="fileInput" multiple accept="image/*">
    <p id="status"></p>

    <div id="viewer">
        <img id="displayImage" src="">
        <div id="answer" class="hidden"></div>
        <div class="controls">
            <button id="btnAnswer">答えを見る</button>
            <button id="btnNext">正解(次へ)</button>
            <button id="btnWrong" style="background-color: #ff3b30;">不正解(記録)</button>
        </div>
    </div>

    <div id="mistakeList">
        <strong>間違えた画像リスト:</strong>
        <ul id="listItems"></ul>
    </div>

    <script>
        let images = [];
        let currentIndex = 0;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            images = Array.from(e.target.files);
            for (let i = images.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [images[i], images[j]] = [images[j], images[i]];
            }
            currentIndex = 0;
            document.getElementById('viewer').style.display = 'block';
            showImage();
        });

        document.getElementById('btnAnswer').onclick = () => document.getElementById('answer').classList.remove('hidden');
        document.getElementById('btnWrong').onclick = () => {
            const li = document.createElement('li');
            li.textContent = images[currentIndex].name.replace(/\.[^/.]+$/, "");
            document.getElementById('listItems').appendChild(li);
            next();
        };
        document.getElementById('btnNext').onclick = next;

        function next() {
            currentIndex = (currentIndex + 1) % images.length;
            showImage();
        }

        function showImage() {
            document.getElementById('displayImage').src = URL.createObjectURL(images[currentIndex]);
            const name = images[currentIndex].name.replace(/\.[^/.]+$/, "");
            document.getElementById('answer').textContent = name;
            document.getElementById('answer').classList.add('hidden');
        }
    </script>
</body>
</html>
