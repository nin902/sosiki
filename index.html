<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>画像ランダムテスト</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f0f0; }
        #imgDisplay { max-width: 100%; max-height: 55vh; border: 2px solid #ccc; background-color: #fff; margin: 10px 0; }
        .controls { margin-top: 10px; }
        button { padding: 12px 24px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; background-color: #007aff; color: white; }
        .btn-danger { background-color: #ff3b30; }
        .btn-secondary { background-color: #6c757d; }
        #debugInfo, #saveLoadSection { background: #fff; padding: 15px; margin: 10px auto; border-radius: 8px; border: 1px solid #ccc; text-align: left; max-width: 800px; }
        .error-text { color: #ff3b30; font-size: 20px; font-weight: bold; margin: 10px 0; display: none; }
        #reviewList { text-align: left; margin-top: 30px; padding-top: 20px; border-top: 2px solid #ccc; max-width: 1000px; margin-left: auto; margin-right: auto; }
        .review-item { display: inline-block; margin: 10px; text-align: center; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; vertical-align: top; width: 160px; }
        .review-item img { max-height: 120px; max-width: 140px; display: block; margin: 0 auto 5px; object-fit: contain; }
        .badge { background: #ff3b30; color: white; padding: 2px 6px; border-radius: 10px; font-size: 14px; font-weight: bold; }
        textarea { width: 100%; height: 60px; margin-top: 5px; font-family: monospace; }
    </style>
</head>
<body>
    <h2>1. 全画像（問題・答え）を一括選択</h2>
    <input type="file" id="fileInput" multiple accept="image/*">
    <div id="debugInfo" style="display:none;"></div>

    <div id="saveLoadSection">
        <h3 style="margin-top:0;">2. データ引き継ぎ（任意）</h3>
        <button class="btn-secondary" onclick="generateCode()">現在の記録からコードを発行↓</button>
        <button class="btn-secondary" onclick="loadCode()">↓コードから復元</button>
        <button class="btn-danger" style="float:right;" onclick="clearRecord()">全記録リセット</button>
        <textarea id="transferCode" placeholder="ここに引き継ぎコードが表示される、または入力して復元します"></textarea>
    </div>

    <div id="viewer" style="display:none;">
        <p id="counter" style="font-weight: bold; font-size:18px; margin: 5px 0;"></p>
        <div id="errorMsg" class="error-text">エラー：答え画像が読み込まれていません</div>
        <img id="imgDisplay">
        <div class="controls">
            <button id="btnShowAns" style="padding: 20px 40px; font-size: 20px;">答えを表示</button>
            <div id="ansControls" style="display:none;">
                <button onclick="record(true)" style="padding: 20px 40px; font-size: 20px;">わかった(次へ)</button>
                <button onclick="record(false)" class="btn-danger" style="padding: 20px 40px; font-size: 20px;">わからなかった(記録)</button>
            </div>
        </div>
    </div>

    <div id="reviewList">
        <h3>わからなかったリスト (間違えた回数順):</h3>
        <div id="reviewContainer"></div>
    </div>

    <script>
        let problems = [];
        let currentIdx = 0;
        let currentUrl = null;
        let fileMap = new Map();
        let mistakeCounts = JSON.parse(localStorage.getItem('pathoMistakes')) || {};

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            fileMap.clear();

            for (const file of files) {
                const nameNoExt = file.name.replace(/\.[^/.]+$/, "").trim();
                const isAns = nameNoExt.endsWith('_ans');
                const baseName = isAns ? nameNoExt.slice(0, -4).trim() : nameNoExt;

                if (!fileMap.has(baseName)) {
                    fileMap.set(baseName, { prob: null, ans: null, name: baseName });
                }
                
                if (isAns) {
                    fileMap.get(baseName).ans = file;
                } else {
                    fileMap.get(baseName).prob = file;
                }
            }

            let pairCount = 0;
            let missingAnsList = [];

            problems = Array.from(fileMap.values()).filter(p => {
                if (p.prob !== null) {
                    if (p.ans !== null) {
                        pairCount++;
                    } else {
                        missingAnsList.push(p.name + "_ans.png");
                    }
                    return true;
                }
                return false;
            });

            const debugDiv = document.getElementById('debugInfo');
            debugDiv.style.display = 'block';
            debugDiv.innerHTML = `
                読込ファイル数: ${files.length}枚 | 正常ペア: ${pairCount}問 | 
                <span style="color:${missingAnsList.length>0?'red':'green'};">答え欠損: ${missingAnsList.length}問</span>
            `;

            if (problems.length === 0) return;

            for (let i = problems.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [problems[i], problems[j]] = [problems[j], problems[i]];
            }

            currentIdx = 0;
            document.getElementById('viewer').style.display = 'block';
            
            renderReviewList();
            show(false);
        });

        function show(isAns) {
            const pair = problems[currentIdx];
            const imgDisplay = document.getElementById('imgDisplay');
            const errorMsg = document.getElementById('errorMsg');

            if (currentUrl) {
                URL.revokeObjectURL(currentUrl);
                currentUrl = null;
            }

            document.getElementById('counter').innerText = `第 ${currentIdx + 1} 問 / ${problems.length} 問中`;

            if (!isAns) {
                errorMsg.style.display = 'none';
                imgDisplay.style.display = 'inline-block';
                currentUrl = URL.createObjectURL(pair.prob);
                imgDisplay.src = currentUrl;
                
                document.getElementById('btnShowAns').style.display = 'inline-block';
                document.getElementById('ansControls').style.display = 'none';
            } else {
                if (!pair.ans) {
                    imgDisplay.style.display = 'none';
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = `エラー： ${pair.name}_ans が見つかりません`;
                } else {
                    errorMsg.style.display = 'none';
                    imgDisplay.style.display = 'inline-block';
                    currentUrl = URL.createObjectURL(pair.ans);
                    imgDisplay.src = currentUrl;
                }
                document.getElementById('btnShowAns').style.display = 'none';
                document.getElementById('ansControls').style.display = 'inline-block';
            }
        }

        document.getElementById('btnShowAns').onclick = () => show(true);
