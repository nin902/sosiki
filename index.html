
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>病理ランダムテスト・ペアリング強化版</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f0f0; }
        #imgDisplay { max-width: 100%; max-height: 60vh; border: 2px solid #ccc; background-color: #fff; margin: 10px 0; }
        .controls { margin-top: 15px; }
        button { padding: 15px 30px; font-size: 18px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; background-color: #007aff; color: white; }
        #reviewList { text-align: left; margin-top: 40px; padding-top: 20px; border-top: 2px solid #ccc; }
        .review-item { display: inline-block; margin: 10px; text-align: center; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .review-item img { max-height: 150px; display: block; margin: 0 auto 5px; }
        #debugInfo { background: #ffeeba; padding: 10px; margin: 10px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>全画像（問題と答えを含む）を選択</h2>
    <input type="file" id="fileInput" multiple accept="image/*">
    <div id="debugInfo" style="display:none;"></div>

    <div id="viewer" style="display:none;">
        <p id="counter"></p>
        <img id="imgDisplay">
        <div class="controls">
            <button id="btnShowAns">答えを表示</button>
            <div id="ansControls" style="display:none;">
                <button onclick="record(true)">わかった(次へ)</button>
                <button onclick="record(false)" style="background:#ff3b30;">わからなかった(記録)</button>
            </div>
        </div>
    </div>

    <div id="reviewList">
        <h3>わからなかったリスト:</h3>
        <div id="reviewContainer"></div>
    </div>

    <script>
        let problems = [];
        let currentIdx = 0;
        let currentUrl = null;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            const fileMap = new Map();
            let rawProbCount = 0;
            let rawAnsCount = 0;

            for (const file of files) {
                // 拡張子を除外し、前後の空白を消す
                const originalNameNoExt = file.name.replace(/\.[^/.]+$/, "").trim();
                // 比較用に小文字化
                const lowerName = originalNameNoExt.toLowerCase();
                
                let baseName = lowerName;
                let isAns = false;

                // _ans, -ans に対応
                if (lowerName.endsWith('_ans') || lowerName.endsWith('-ans')) {
                    isAns = true;
                    baseName = lowerName.slice(0, -4).trim();
                    rawAnsCount++;
                } else {
                    rawProbCount++;
                }

                if (!fileMap.has(baseName)) {
                    fileMap.set(baseName, { prob: null, ans: null, name: originalNameNoExt });
                }
                
                if (isAns) {
                    fileMap.get(baseName).ans = file;
                } else {
                    fileMap.get(baseName).prob = file;
                }
            }

            let pairCount = 0;
            let noAnsCount = 0;

            problems = Array.from(fileMap.values()).filter(p => {
                if (p.prob !== null) {
                    if (p.ans !== null) {
                        pairCount++;
                    } else {
                        noAnsCount++;
                    }
                    return true;
                }
                return false;
            });

            const debugDiv = document.getElementById('debugInfo');
            debugDiv.style.display = 'block';
            debugDiv.innerHTML = `
                読み込みファイル数: ${files.length}枚<br>
                正常にペアになった問題: ${pairCount}問<br>
                答え画像が見つからない問題: ${noAnsCount}問
            `;

            if (problems.length === 0) {
                return;
            }

            // ランダムシャッフル
            for (let i = problems.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [problems[i], problems[j]] = [problems[j], problems[i]];
            }

            currentIdx = 0;
            document.getElementById('viewer').style.display = 'block';
            show(false);
        });

        function show(isAns) {
            const pair = problems[currentIdx];

            if (currentUrl) {
                URL.revokeObjectURL(currentUrl);
            }

            const fileToShow = isAns ? (pair.ans || pair.prob) : pair.prob;
            currentUrl = URL.createObjectURL(fileToShow);
            document.getElementById('imgDisplay').src = currentUrl;

            document.getElementById('counter').innerText = `第 ${currentIdx + 1} 問 / ${problems.length} 問中`;

            if (!isAns) {
                document.getElementById('btnShowAns').style.display = 'inline-block';
                document.getElementById('ansControls').style.display = 'none';
            } else {
                document.getElementById('btnShowAns').style.display = 'none';
                document.getElementById('ansControls').style.display = 'inline-block';
            }
        }

        document.getElementById('btnShowAns').onclick = () => show(true);

        function record(isKnown) {
            if (!isKnown) {
                const pair = problems[currentIdx];
                const div = document.createElement('div');
                div.className = 'review-item';

                const img = document.createElement('img');
                const ansFile = pair.ans || pair.prob;
                img.src = URL.createObjectURL(ansFile);

                const p = document.createElement('p');
                p.innerText = pair.name;

                div.appendChild(img);
                div.appendChild(p);
                document.getElementById('reviewContainer').appendChild(div);
            }

            currentIdx++;
            if (currentIdx >= problems.length) {
                alert('全問題が終了。最初に戻る。');
                currentIdx = 0;
            }
            show(false);
        }
    </script>
</body>
</html>
